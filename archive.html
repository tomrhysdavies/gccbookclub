<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Next Chapter | Past Reads Archive</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #fcfbf7;
            --text-color: #2c2c2c;
            --accent-color: #2e5a44; 
            --card-bg: #ffffff;
            --border-color: #e6e4de;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: "Georgia", serif;
            color: var(--accent-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .back-link {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-block;
            margin-bottom: 20px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* Archive Grid Layout */
        .archive-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
            width: 100%;
        }

        .archive-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .archive-cover {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.08);
            margin-bottom: 15px;
        }

        .archive-title {
            font-family: "Georgia", serif;
            font-size: 1.25rem;
            margin: 0 0 5px 0;
            font-weight: bold;
            line-height: 1.3;
        }

        .archive-author {
            font-style: italic;
            color: #555;
            font-size: 0.95rem;
            margin-bottom: 12px;
        }

        .meta-badge {
            display: inline-block;
            background-color: #f2efea;
            color: #444;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 4px;
            margin-bottom: 6px;
        }

        .rating-badge {
            background-color: #e2f0d9;
            color: var(--accent-color);
            font-weight: bold;
        }

        .session-notes {
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px dashed var(--border-color);
            font-size: 0.88rem;
            line-height: 1.4;
            color: #555;
            background: #fafafa;
            padding: 8px;
            border-radius: 4px;
        }

        .loading-text {
            text-align: center;
            color: #666;
            font-style: italic;
            grid-column: 1 / -1;
            padding: 40px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <a href="index.html" class="back-link">← Back to Current Nominations</a>
            <h1>Our Reading History</h1>
            <p style="color: #666; margin-top: 0;">A collection of everything we've read, rated, and discussed.</p>
        </header>

        <div class="archive-grid" id="archive-grid">
            <div class="loading-text">Opening the club archives history...</div>
        </div>
    </div>

    <script>
        // ==========================================
        //  🗄️ SUPABASE CONFIGURATION
        // ==========================================
        const SUPABASE_URL = "https://sucxgonasdoqqymeszpl.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1Y3hnb25hc2RvcXF5bWVzenBsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMDM0MjQsImV4cCI6MjA5NTg3OTQyNH0.j_zBJIfLw302hOevrCDH929ToXZFlB-7BWzRlIh9Hdo";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Helper function to turn database dates (YYYY-MM-DD) into nice readable text
        function formatDate(dateString) {
            if(!dateString) return "Unknown Date";
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return new Date(dateString).toLocaleDateString(undefined, options);
        }

        async function loadArchiveShelf() {
            const gridContainer = document.getElementById('archive-grid');
            
            try {
                // Fetch past reads ordered by session meetup date (newest first)
                const { data: pastReads, error } = await supabaseClient
                    .from('past_reads')
                    .select('*')
                    .order('session_date', { ascending: false });

                if (error) throw error;

                if (!pastReads || pastReads.length === 0) {
                    gridContainer.innerHTML = `<div class="loading-text" style="font-style: normal;">The history shelf is empty right now. Once a book is completed and archived, it will appear here!</div>`;
                    return;
                }

                // Render the historical book shelf cards grid
                gridContainer.innerHTML = pastReads.map(book => {
                    // Safe parsing for notes text or displaying fallback text if notes are blank
                    const notesSnippet = book.group_notes 
                        ? `<div class="session-notes"><strong>Meetup Notes:</strong><br>${book.group_notes}</div>` 
                        : '';

                    return `
                        <div class="archive-card">
                            <img class="archive-cover" src="${book.cover_url || 'https://via.placeholder.com/200x300?text=No+Cover'}" alt="${book.title} Cover" onerror="this.src='https://via.placeholder.com/200x300?text=No+Cover'">
                            
                            <div class="meta-badge rating-badge">⭐ ${book.average_rating ? book.average_rating.toFixed(2) : '0.00'} / 5.00</div>
                            <div class="meta-badge">📅 ${formatDate(book.session_date)}</div>
                            <div class="meta-badge">👤 Picked by: ${book.picker || 'Host Selection'}</div>

                            <h3 class="archive-title">${book.title}</h3>
                            <div class="archive-author">By ${book.author}</div>
                            
                            ${notesSnippet}
                        </div>
                    `;
                }).join('');

            } catch (err) {
                console.error("Error loading archive data table rows:", err);
                gridContainer.innerHTML = `<div class="loading-text" style="color: #b03a2e; font-style: normal;">Failed to read history shelf data from Supabase.</div>`;
            }
        }

        // Initialize grid render sequence on browser load
        loadArchiveShelf();
    </script>
</body>
</html>
